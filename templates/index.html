<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Horario mensual</title>

    <!-- ✅ Bootstrap bien cargado -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm p-4">

        <h2 class="mb-4 text-center">🕒 Horario mensual</h2>

        <!-- FORMULARIO -->
        <form method="post" class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label">Fecha</label>
                <input type="date" name="fecha" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Entrada</label>
                <input type="time" name="entrada" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Salida</label>
                <input type="time" name="salida" class="form-control" required>
            </div>

            <div class="col-12 text-end">
                <button class="btn btn-primary">Guardar horario</button>
            </div>
        </form>

        <!-- TOTAL -->
        <div class="alert alert-info text-center">
            <strong>Total de horas del mes:</strong> {{ total_horas }} horas
        </div>

        <!-- TABLA -->
        <h4 class="mt-4">Registros</h4>

        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Fecha</th>
                    <th>Entrada</th>
                    <th>Salida</th>
                    <th>Horas</th>
                </tr>
            </thead>
            <tbody>
                {% for f, e, s, h in datos %}
                <tr>
                    <td>{{ f }}</td>
                    <td>{{ e }}</td>
                    <td>{{ s }}</td>
                    <td>{{ h }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
